<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sabri Emir - Rap & Game Arena</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #fff; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.3; }
        
        /* Oyun ve Skor Alanı */
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stat { font-size: 24px; color: #00f5ff; text-shadow: 0 0 10px #00f5ff; margin-bottom: 5px; }

        /* Kaydırmalı Rap Listesi */
        #playlist { 
            position: absolute; right: 20px; top: 20px; bottom: 20px; width: 280px;
            background: rgba(0, 0, 0, 0.8); border: 2px solid #00f5ff;
            border-radius: 20px; overflow-y: scroll; padding: 15px; pointer-events: auto;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }
        #playlist::-webkit-scrollbar { width: 5px; }
        #playlist::-webkit-scrollbar-thumb { background: #00f5ff; border-radius: 10px; }

        .song { 
            padding: 15px; margin-bottom: 12px; background: rgba(0, 245, 255, 0.1);
            border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid transparent;
        }
        .song:hover { background: rgba(0, 245, 255, 0.3); border: 1px solid #00f5ff; transform: scale(1.05); }
        .song.active { border: 2px solid #00f5ff; background: rgba(0, 245, 255, 0.4); }

        /* Hedef Küreler */
        .target { 
            position: absolute; width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle, #00f5ff, transparent);
            box-shadow: 0 0 40px #00f5ff; display: none; cursor: crosshair;
        }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<div id="hud">
    <div class="stat">SKOR: <span id="score">0</span></div>
    <div class="stat" style="font-size: 14px;">ÇALIYOR: <span id="current-song">-</span></div>
</div>

<div id="playlist">
    <h3 style="text-align:center; color:#00f5ff;">RAP HITS</h3>
    <div class="song" onclick="selectSong(this, 'BLOK3 - GİT')">BLOK3 - GİT 🏎️</div>
    <div class="song" onclick="selectSong(this, 'MERO - OLABİLİR')">MERO - OLABİLİR 🔥</div>
    <div class="song" onclick="selectSong(this, 'LVBEL C5 - BABA')">LVBEL C5 - BABA 💰</div>
    <div class="song" onclick="selectSong(this, 'BANA HAKO DİYORLAR')">BANA HAKO DİYORLAR 🕶️</div>
    <div class="song" onclick="selectSong(this, 'MERO - BRABBAB 2')">MERO - BRABBAB 2 🔫</div>
    <div class="song" onclick="selectSong(this, 'ÇAKAL - İMDAT')">ÇAKAL - İMDAT 🚨</div>
    <div class="song" onclick="selectSong(this, 'UZI - ARASAN DA')">UZI - ARASAN DA 📞</div>
</div>

<div id="t1" class="target" onclick="hit(this)"></div>
<div id="t2" class="target" onclick="hit(this)"></div>

<script>
    let score = 0;
    const scoreEl = document.getElementById('score');
    const songEl = document.getElementById('current-song');

    // Kamera açılış
    navigator.mediaDevices.getUserMedia({ video: true }).then(s => { 
        document.getElementById('video').srcObject = s; 
    });

    // Şarkı Seçme ve Oyun Başlatma
    function selectSong(el, name) {
        document.querySelectorAll('.song').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        songEl.innerText = name;
        
        // Oyun döngüsünü başlat
        score = 0;
        scoreEl.innerText = score;
        spawnTarget('t1');
        setTimeout(() => spawnTarget('t2'), 1000);
        
        // Buradan sonra arkada YouTube Music'ten şarkıyı açabilirsin kanka!
    }

    // Hedef Patlatma
    function hit(el) {
        score += 10;
        scoreEl.innerText = score;
        el.style.display = 'none';
        setTimeout(() => spawnTarget(el.id), 800);
    }

    function spawnTarget(id) {
        const el = document.getElementById(id);
        el.style.top = (Math.random() * 60 + 10) + "%";
        el.style.left = (Math.random() * 40 + 10) + "%";
        el.style.display = 'block';
    }
</script>
</body>
</html>
